services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: food
      POSTGRES_PASSWORD: food
      POSTGRES_DB: fooddelivery
    volumes:
      - ./deploy/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food -d fooddelivery"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
    mem_limit: 768m
    cpus: 1.5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:9092
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --default-log-level=warn
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    mem_limit: 768m
    cpus: 0.75

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    environment:
      PG_DSN: postgres://food:food@postgres:5432/fooddelivery?sslmode=disable
      HTTP_ADDR: :8081
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/readyz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 256M
    mem_limit: 256m
    cpus: 0.45

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    environment:
      PG_DSN: postgres://food:food@postgres:5432/fooddelivery?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      CATALOG_BASE_URL: http://catalog-service:8081
      HTTP_ADDR: :8082
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/readyz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 8s
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: 256M
    mem_limit: 256m
    cpus: 0.55

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    environment:
      PG_DSN: postgres://food:food@postgres:5432/fooddelivery?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      HTTP_ADDR: :8083
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/readyz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 256M
    mem_limit: 256m
    cpus: 0.35

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 256M
    mem_limit: 256m
    cpus: 1.5
